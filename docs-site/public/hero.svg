<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 520" width="880" height="520" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <linearGradient id="h-nav" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#326CE5"/>
      <stop offset="1" stop-color="#1B47C0"/>
    </linearGradient>
    <linearGradient id="h-cpu" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#326CE5" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#326CE5" stop-opacity="0"/>
    </linearGradient>
    <filter id="h-shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#1B47C0" flood-opacity="0.18"/>
    </filter>
    <clipPath id="h-card"><rect x="20" y="20" width="840" height="480" rx="18"/></clipPath>
  </defs>

  <!-- 主面板 -->
  <g filter="url(#h-shadow)">
    <rect x="20" y="20" width="840" height="480" rx="18" fill="#FFFFFF"/>
  </g>

  <g clip-path="url(#h-card)">
    <!-- 侧边栏 -->
    <rect x="20" y="20" width="178" height="480" fill="url(#h-nav)"/>
    <!-- 侧边栏 logo（舵轮） -->
    <g transform="translate(40,44) scale(0.32)">
      <polygon points="64,12 104.65,31.58 114.69,75.57 86.56,110.85 41.44,110.85 13.31,75.57 23.35,31.58" fill="#FFFFFF"/>
      <g stroke="#326CE5" stroke-width="6" stroke-linecap="round">
        <line x1="64" y1="64" x2="64" y2="12"/><line x1="64" y1="64" x2="104.65" y2="31.58"/>
        <line x1="64" y1="64" x2="114.69" y2="75.57"/><line x1="64" y1="64" x2="86.56" y2="110.85"/>
        <line x1="64" y1="64" x2="41.44" y2="110.85"/><line x1="64" y1="64" x2="13.31" y2="75.57"/>
        <line x1="64" y1="64" x2="23.35" y2="31.58"/>
      </g>
      <circle cx="64" cy="64" r="13" fill="#FFFFFF"/>
    </g>
    <text x="100" y="70" fill="#FFFFFF" font-size="17" font-weight="700">Kube Admin</text>

    <!-- 菜单项 -->
    <g font-size="13" fill="#DCE6FF">
      <rect x="36" y="118" width="146" height="34" rx="8" fill="#FFFFFF" fill-opacity="0.16"/>
      <text x="56" y="140">总览</text>
      <text x="56" y="186">集群</text>
      <text x="56" y="232">节点</text>
      <text x="56" y="278">Pod</text>
      <text x="56" y="324">资源浏览器</text>
      <text x="56" y="370">审计日志</text>
    </g>

    <!-- 主区背景 -->
    <rect x="198" y="20" width="662" height="480" fill="#F7F9FC"/>

    <!-- 顶栏 -->
    <text x="222" y="62" fill="#1F2937" font-size="20" font-weight="700">集群总览</text>
    <circle cx="800" cy="56" r="5" fill="#22C55E"/>
    <text x="712" y="61" fill="#6B7280" font-size="12">3 个集群在线</text>

    <!-- KPI 卡 -->
    <g>
      <rect x="222" y="88" width="200" height="96" rx="12" fill="#FFFFFF"/>
      <text x="240" y="114" fill="#9CA3AF" font-size="12">集群</text>
      <text x="240" y="152" fill="#1F2937" font-size="30" font-weight="700">3</text>
      <polyline points="312,168 332,156 352,162 372,146 392,150 404,140" fill="none" stroke="#326CE5" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

      <rect x="432" y="88" width="200" height="96" rx="12" fill="#FFFFFF"/>
      <text x="450" y="114" fill="#9CA3AF" font-size="12">节点</text>
      <text x="450" y="152" fill="#1F2937" font-size="30" font-weight="700">12</text>
      <polyline points="522,168 542,160 562,166 582,150 602,156 614,144" fill="none" stroke="#22C55E" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

      <rect x="642" y="88" width="200" height="96" rx="12" fill="#FFFFFF"/>
      <text x="660" y="114" fill="#9CA3AF" font-size="12">Pod</text>
      <text x="660" y="152" fill="#1F2937" font-size="30" font-weight="700">148</text>
      <polyline points="732,170 752,158 772,164 792,148 812,154 824,138" fill="none" stroke="#F59E0B" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    </g>

    <!-- 折线图卡 -->
    <rect x="222" y="200" width="620" height="256" rx="12" fill="#FFFFFF"/>
    <text x="240" y="228" fill="#1F2937" font-size="14" font-weight="600">资源使用率</text>
    <!-- 图例 -->
    <circle cx="700" cy="223" r="4" fill="#326CE5"/><text x="710" y="227" fill="#6B7280" font-size="11">CPU</text>
    <circle cx="752" cy="223" r="4" fill="#F59E0B"/><text x="762" y="227" fill="#6B7280" font-size="11">内存</text>

    <!-- 网格 -->
    <g stroke="#EEF2F7" stroke-width="1">
      <line x1="240" y1="260" x2="824" y2="260"/>
      <line x1="240" y1="310" x2="824" y2="310"/>
      <line x1="240" y1="360" x2="824" y2="360"/>
      <line x1="240" y1="410" x2="824" y2="410"/>
    </g>

    <!-- CPU 区域 + 折线 -->
    <polygon points="240,400 296,384 352,392 408,366 464,374 520,348 576,360 632,334 688,342 744,316 800,326 824,320 824,430 240,430" fill="url(#h-cpu)"/>
    <polyline points="240,400 296,384 352,392 408,366 464,374 520,348 576,360 632,334 688,342 744,316 800,326 824,320" fill="none" stroke="#326CE5" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- 内存折线 -->
    <polyline points="240,412 296,402 352,398 408,388 464,380 520,372 576,366 632,356 688,350 744,342 800,334 824,330" fill="none" stroke="#F59E0B" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- x 轴标签 -->
    <g fill="#9CA3AF" font-size="10">
      <text x="240" y="446">00:00</text><text x="408" y="446">06:00</text>
      <text x="576" y="446">12:00</text><text x="744" y="446">18:00</text>
    </g>

    <!-- 底部 Pod 状态条 -->
    <rect x="222" y="472" width="620" height="14" rx="7" fill="#E5EAF2"/>
    <rect x="222" y="472" width="430" height="14" rx="7" fill="#326CE5"/>
    <text x="232" y="483" fill="#FFFFFF" font-size="10" font-weight="600">Running 130 / 148</text>
  </g>
</svg>
