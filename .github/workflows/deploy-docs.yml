# 文档站（VitePress）部署到云主机（宝塔站点子目录）。
# 触发：push 到 main 且 docs-site/ 变更；支持手动 workflow_dispatch。
# 链路：npm run docs:build（DOCS_BASE=/kube-admin/ 子路径）→ rsync 静态产物到云主机 DOCS_PATH。
#
# 必需 GitHub Secrets：SERVER_HOST / SERVER_PORT / SERVER_USER / DOCS_PATH / SERVER_SSH_KEY
#   DOCS_PATH = /www/wwwroot/docs.cncf.vip/kube-admin
# 必需 GitHub Variables：DOCS_BASE = /kube-admin/   （对应访问地址 https://docs.cncf.vip/kube-admin/）
# 云主机账号与密钥需预先配置：专用 deploy 账号 + ed25519 公钥写入 authorized_keys。
name: Deploy Docs

on:
  push:
    branches: [main]
    paths:
      - 'docs-site/**'
      - '.github/workflows/deploy-docs.yml'
  workflow_dispatch:

# 部署串行，不取消进行中的 run（避免半成品）
concurrency:
  group: deploy-docs
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: docs-site
    steps:
      - uses: actions/checkout@v4

      - name: 安装 Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: docs-site/package-lock.json

      - name: 安装依赖
        run: npm ci

      - name: 构建文档站
        env:
          DOCS_BASE: ${{ vars.DOCS_BASE || '/' }}
        run: npm run docs:build

      - name: 配置 SSH 密钥
        working-directory: ${{ github.workspace }}
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_PORT: ${{ secrets.SERVER_PORT }}
          SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
        run: |
          install -m 600 -D /dev/null ~/.ssh/id_ed25519
          printf '%s\n' "$SERVER_SSH_KEY" > ~/.ssh/id_ed25519
          ssh-keyscan -H -p "$SERVER_PORT" "$SERVER_HOST" >> ~/.ssh/known_hosts 2>/dev/null

      - name: rsync 同步到云主机
        working-directory: ${{ github.workspace }}
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_PORT: ${{ secrets.SERVER_PORT }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          DOCS_PATH: ${{ secrets.DOCS_PATH }}
        run: |
          # --exclude=.user.ini：宝塔锁定文件（不可删）；--exclude=.well-known：Let's Encrypt 证书验证目录
          rsync -avz --delete \
            --exclude=.user.ini \
            --exclude=.well-known \
            --omit-dir-times \
            --no-perms \
            -e "ssh -i ~/.ssh/id_ed25519 -p $SERVER_PORT" \
            docs-site/.vitepress/dist/ \
            "$SERVER_USER@$SERVER_HOST:$DOCS_PATH/"
