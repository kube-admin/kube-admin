name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

# 同分支新提交取消进行中的旧 run，省 CI 配额
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (Go)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: backend/go.sum
      - name: Download dependencies
        run: go mod download
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.12.2
          working-directory: backend
          args: --timeout=5m
      - name: Build
        run: go build ./...
      - name: Vet
        run: go vet ./...
      - name: Test
        run: go test ./...

  frontend:
    name: Frontend (Vue)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Type check
        run: npm run lint
      - name: Unit test
        run: npm run test
      - name: Build
        run: npm run build
      # E2E（`npm run test:e2e`，Playwright）未纳入 CI：用例需真实 k8s 集群 + 后端，
      # GitHub-hosted runner 无集群，跑通也不代表线上可用。待引入 kind 集群后再开 CI E2E job。
      # 本地运行方式见 frontend/e2e/README.md。
