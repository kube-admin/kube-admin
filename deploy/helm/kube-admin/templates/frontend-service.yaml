apiVersion: v1
kind: Service
metadata:
  name: kube-admin-frontend
  namespace: {{ .Release.Namespace }}
  labels:
{{ include "kube-admin.labels" . | indent 4 }}
spec:
  type: {{ .Values.service.frontend.type }}
  selector:
    app: kube-admin-frontend
  ports:
    - port: {{ .Values.service.frontend.port }}
      targetPort: 80
      protocol: TCP
