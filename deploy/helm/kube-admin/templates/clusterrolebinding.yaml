apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kube-admin
subjects:
  - kind: ServiceAccount
    name: {{ include "kube-admin.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: ClusterRole
  name: kube-admin
  apiGroup: rbac.authorization.k8s.io
