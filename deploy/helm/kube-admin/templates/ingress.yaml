{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: kube-admin
  namespace: {{ .Release.Namespace }}
  labels:
{{ include "kube-admin.labels" . | indent 4 }}
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
spec:
  ingressClassName: {{ .Values.ingress.className }}
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service: { name: kube-admin-frontend, port: { number: {{ .Values.service.frontend.port }} } }
          - path: /api
            pathType: Prefix
            backend:
              service: { name: {{ include "kube-admin.backendServiceName" . }}, port: { number: {{ .Values.service.backend.port }} } }
          - path: /ws
            pathType: Prefix
            backend:
              service: { name: {{ include "kube-admin.backendServiceName" . }}, port: { number: {{ .Values.service.backend.port }} } }
{{- end }}
