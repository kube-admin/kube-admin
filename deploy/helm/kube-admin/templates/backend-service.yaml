# 名称固定为 backend：前端 nginx 反代 http://backend:8080 依赖此 DNS 名。
apiVersion: v1
kind: Service
metadata:
  name: {{ include "kube-admin.backendServiceName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
{{ include "kube-admin.labels" . | indent 4 }}
spec:
  type: {{ .Values.service.backend.type }}
  selector:
    app: kube-admin-backend
  ports:
    - port: {{ .Values.service.backend.port }}
      targetPort: 8080
      protocol: TCP
