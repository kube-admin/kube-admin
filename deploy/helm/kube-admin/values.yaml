# Kube Admin Helm values
# 生产部署请用 --set 覆盖密钥，或改用 ExternalSecrets/sealed-secrets（见 README）。

# --- 镜像 ---
image:
  backend:
    repository: ghcr.io/kube-admin/kube-admin-backend
    tag: latest
    pullPolicy: IfNotPresent
  frontend:
    repository: ghcr.io/kube-admin/kube-admin-frontend
    tag: latest
    pullPolicy: IfNotPresent

# --- 副本 ---
backend:
  replicas: 1
  strategy: Recreate   # SQLite 单写者；切外部 DB 后改 RollingUpdate 并调大 replicas
frontend:
  replicas: 1

# --- 密钥（务必覆盖！）---
secrets:
  jwtSecret: "CHANGE_ME_JWT_SECRET"      # openssl rand -base64 32
  encryptKey: "CHANGE_ME_ENCRYPT_KEY"    # openssl rand -base64 32
  dbDSN: ""                              # sqlite 留空；mysql/postgres 填 DSN

# --- 数据库 ---
database:
  driver: sqlite        # sqlite | mysql | postgres
  sqlitePath: /data/kubeadm.db
  persistence:
    enabled: true
    size: 1Gi
    storageClass: ""    # 留空用集群默认 StorageClass

# --- ServiceAccount（集群内部署用 SA 管自身集群）---
serviceAccount:
  create: true
  name: ""              # 留空则用 kube-admin-sa
  clusterRole:
    wide: true          # true=含通用资源 apply 宽口径；false=只读收窄（牺牲通用资源功能）

# --- Service ---
service:
  backend: { type: ClusterIP, port: 8080 }
  frontend: { type: ClusterIP, port: 80 }

# --- Ingress ---
ingress:
  enabled: false
  className: nginx
  host: kube-admin.local
