# ⚠️ 部署前必须替换占位值！
#   jwt-secret:   openssl rand -base64 32
#   encrypt-key:  openssl rand -base64 32（任意长度，后端内部 SHA-256 派生）
#   db-dsn:       仅 DB_DRIVER=mysql/postgres 时填写；sqlite 留空
# 生产环境建议改用 ExternalSecrets / sealed-secrets，避免密钥进 Git。
apiVersion: v1
kind: Secret
metadata:
  name: kube-admin-secret
  namespace: kube-admin
type: Opaque
stringData:
  jwt-secret: "CHANGE_ME_JWT_SECRET"
  encrypt-key: "CHANGE_ME_ENCRYPT_KEY"
  db-dsn: ""
