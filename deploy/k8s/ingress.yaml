# 部署后把 host 改为实际域名。WebSocket（/ws）由 ingress-nginx 默认支持自动 Upgrade。
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: kube-admin
  namespace: kube-admin
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
spec:
  ingressClassName: nginx
  rules:
    - host: kube-admin.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service: { name: kube-admin-frontend, port: { number: 80 } }
          - path: /api
            pathType: Prefix
            backend:
              service: { name: backend, port: { number: 8080 } }
          - path: /ws
            pathType: Prefix
            backend:
              service: { name: backend, port: { number: 8080 } }
