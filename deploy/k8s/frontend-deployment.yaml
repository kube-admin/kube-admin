apiVersion: apps/v1
kind: Deployment
metadata:
  name: kube-admin-frontend
  namespace: kube-admin
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kube-admin-frontend
  template:
    metadata:
      labels:
        app: kube-admin-frontend
    spec:
      containers:
        - name: frontend
          image: ghcr.io/kube-admin/kube-admin-frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
