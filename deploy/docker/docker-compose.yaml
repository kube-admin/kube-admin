# Kube Admin 单机 Docker 部署。
# 用法：在 deploy/ 下 `cp .env.example .env` 填密钥，再 `bash deploy/deploy.sh up` 或 `make docker-up`。
# 构建上下文为仓库根（context: ../..），Dockerfile 内 COPY backend/ frontend/ 才能命中。
services:
  backend:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.backend
    container_name: kube-admin-backend
    restart: unless-stopped
    environment:
      PORT: "8080"
      GIN_MODE: ${GIN_MODE:-release}
      # 密钥强制必填：未设置则 compose 直接报错，避免误用弱默认值
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set (see deploy/.env.example)}
      ENCRYPT_KEY: ${ENCRYPT_KEY:?ENCRYPT_KEY must be set (see deploy/.env.example)}
      DB_DRIVER: ${DB_DRIVER:-sqlite}
      DB_PATH: ${DB_PATH:-/data/kubeadm.db}
      DB_DSN: ${DB_DSN:-}
      TLS_SKIP_VERIFY: ${TLS_SKIP_VERIFY:-false}
    volumes:
      - backend-data:/data
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 15s
      timeout: 3s
      retries: 5
      start_period: 10s
    networks:
      - kube-admin

  frontend:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.frontend
    container_name: kube-admin-frontend
    restart: unless-stopped
    ports:
      - "80:8080"   # 宿主机 80 -> 容器 8080（nginx 非 root 监听 8080）
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - kube-admin

networks:
  kube-admin:
    driver: bridge

volumes:
  backend-data:
    driver: local
